<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projekt Hub</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:500px;
    text-align:center;
}

h1{
    margin-bottom:10px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:20px;
}

a{
    display:block;
    padding:18px;
    background:#1f2937;
    border-radius:12px;
    text-decoration:none;
    color:white;
    transition:0.2s;
}

a:hover{
    background:#374151;
    transform:scale(1.05);
}

small{
    color:#94a3b8;
}
</style>

</head>
<body>

<div class="container">
    <h1>🐳 Projekt Hub</h1>
    <small>Lädt Dateien automatisch aus GitHub...</small>

    <div class="grid" id="list"></div>
</div>

<script>
const user = "bobi726";
const repo = "ProjekteHub";

const api = `https://api.github.com/repos/${user}/${repo}/contents/`;

async function loadFiles(){
    try {
        const res = await fetch(api);
        const data = await res.json();

        const list = document.getElementById("list");

        data.forEach(file => {
            if(file.name.endsWith(".html") && file.name !== "index.html"){

                const a = document.createElement("a");
                a.href = file.name;
                a.innerText = "📄 " + file.name.replace(".html","");
                list.appendChild(a);
            }
        });

    } catch (e){
        document.getElementById("list").innerHTML =
        "<p>❌ Fehler beim Laden der Dateien</p>";
    }
}

loadFiles();
</script>

</body>
</html>
